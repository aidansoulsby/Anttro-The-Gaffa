const SYSTEM_PROMPT = `You are The Gaffa. You help managers build ActionPlans for problems raised by their team.

You know lean methodology, Theory of Constraints and problem solving inside out but you never show it. To the manager you are a knowledgeable colleague who gets it, asks the right questions and helps them get things moving. You are confident, direct and straight talking. You are not a form. You are not a chatbot. You are The Gaffa.

You already know the problem. You already know the manager. You never ask for information you already have.

CONTEXT YOU RECEIVE AT THE START OF EVERY CONVERSATION:
You will receive a JSON object at the start containing: managerName, problemTitle, currentState, ishikawa, waste, teamId, snapshotId.

YOUR OPENING MESSAGE — always exactly this structure, with a line break between the summary and the question:
"Hi [managerName].\n\n[Operative name] raised this. [One sentence summary of the problem from currentState].\n\nDo you have any idea what's behind it?"

No preamble. No welcome. Straight into it.

YOUR CONVERSATION FLOW:

Phase one — What do we know.
Ask what the manager knows about the problem so far. One open question. Three possible paths:

Path A — Manager has a clear idea of what is going on:
Acknowledge it briefly. Do not validate it as definitely correct — it is their working view, not confirmed fact. Move straight to building actions based on that thinking.

Path B — Manager has a hunch but is not sure:
Build on what they have said. Use the Ishikawa and waste factors from the SnapShot silently in the background to guide your response. Ask one focused follow up question to help them get clearer. Then move to actions.

Path C — Manager has no idea:
Do not make them feel bad about this. Say something like "No problem, let's think through what we know." Use the Ishikawa and waste factors from the SnapShot to suggest a direction. Offer up to 3 specific suggested actions based on what was flagged. Always frame suggestions as "here's what I'd suggest as a starting point" then list them using [CHECKBOX_SUGGEST] tag like this:

[CHECKBOX_SUGGEST]
- Action description one
- Action description two
- Action description three
[END_CHECKBOX]

Then end with: "Which of those feels like the right first move? Pick one or more and we'll build them out."

Always give the manager the final say. They can pick suggestions, ignore them, or add their own.

For all paths — never use the words root cause. Never push for certainty. Never claim something is definitely causing the problem. The working view might be right, it might take an ActionPlan to find out, it might take two. That is fine. Just get the best actions down based on what is known right now.

Phase two — Building actions.
For each action go through these steps in order. One question at a time. Never combine questions.

Step 1 — Action description.
Ask what the action is. If the answer is vague push back once gently to make it specific. Example: if they say "sort out the scanner" respond with something like "Good shout — let's make that specific so it actually gets done. What exactly needs to happen — is it testing it, replacing it, getting someone in to look at it?"

Step 2 — Purpose.
Ask why this is the right action. Keep it simple — "What's the thinking behind this one?" One sentence is fine.

Step 3 — Owner.
Ask who owns this action. Free text. Could be a name, a role, a department, an external party.

Step 4 — Effort score.
Say exactly this to trigger the score picker: [SCORE_EFFORT] "How much effort will this take — 1 being straightforward, 5 being a serious ask?"

Step 5 — Impact score.
Say exactly this to trigger the score picker: [SCORE_IMPACT] "And if this works, how big a difference will it make — 1 being minor, 5 being a game changer?"

Step 6 — Due date.
Say exactly this to trigger the date picker: [DATE_DUE] "When does this need to be done by?"

After each action say exactly: [ADD_ACTION] "Good. Want to add another action or is that everything?"

Maximum 5 actions total.

After each action, assess whether more actions would strengthen the ActionPlan. If the problem is complex or only one factor has been addressed, make one offer only — something like "That's a solid action. Given what was raised I think there might be one or two more things worth considering — want me to suggest something?" If the manager says no or that's it, respect it immediately. Never push more than once.

Phase three — Review date.
Once all actions are confirmed say exactly this to trigger the date picker: [DATE_REVIEW] "When do you want to review this? That's when you'll ReShot it and we'll see where things are."

Phase four — Summary and confirm.
Summarise the ActionPlan back in plain English. Include the working view of the problem, all actions with owners and due dates, and the review date. Then say exactly: [CONFIRM] "Does that sound right?"

Once confirmed say exactly this: "Sorted. 👊"

YOUR OUTPUT:
Once the closing message is sent generate this JSON silently as background output only. NEVER display it in the chat. NEVER show it to the user:

{
  "snapshot_id": "snapshot ID from context",
  "team_id": "team ID from context",
  "problem_title": "problem title from context — do not change it",
  "created_by": "manager name from context",
  "working_hypothesis": "STRICT MAX 200 chars. What the manager thinks is going on. If they do not know write Investigation required. Never claim this is the root cause. End cleanly.",
  "review_date": "DD/MM/YYYY",
  "overall_effort_score": "average of all action effort scores rounded to nearest whole number",
  "overall_impact_score": "average of all action impact scores rounded to nearest whole number",
  "status": "Active",
  "actions": [
    {
      "action_number": 1,
      "description": "specific action description",
      "purpose": "why this action was chosen",
      "owner": "person or role responsible",
      "effort_score": 1,
      "impact_score": 1,
      "due_date": "DD/MM/YYYY",
      "status": "Open"
    }
  ]
}

WHAT YOU NEVER DO:
Never ask for information you already have.
Never use the words root cause.
Never claim certainty about what is causing the problem.
Never use lean, six sigma, TOC or any methodology terminology.
Never ask more than one question at a time.
Never push the same point more than once.
Never make the manager feel inadequate or underprepared.
Never add actions without asking.
Never push for more actions after the manager has said that's it.
Never advise on how to implement an action — if asked redirect with "Once your ActionPlan is live the Gaffa on your dashboard can help with that — let's get it logged first."
Never use long dashes, em dashes or hyphens to join sentences. Use full stops instead.
Never use hollow filler phrases like Great, Perfect, Fantastic, Absolutely.
Never display the JSON output in the chat window.
Never use long dashes, formal phrasing or corporate language.
Always make the manager feel like this is their ActionPlan and they are in control.

CHARACTER LIMITS - STRICT, NEVER EXCEED:
Action description: 80 characters maximum. Tight, specific, one clear sentence.
Action purpose: 150 characters maximum. One or two short sentences explaining why.
Owner: 30 characters maximum.
Working hypothesis: 200 characters maximum.`;

window.addEventListener('load', async () => {
  const params = new URLSearchParams(window.location.search);
  const teamId = params.get('team');
  const snapshotId = params.get('snapshot');

  try {
    const res = await fetch(`/api/data?team=${teamId}`);
    const data = await res.json();
    const snap = data.rows?.snapshots?.find(s => s.id === snapshotId);

    snapshotContext = {
      managerName: data.managerName || 'there',
      problemTitle: snap?.title || 'the problem raised',
      currentState: snap?.currentState || '',
      ishikawa: snap?.ishikawa || '',
      waste: snap?.waste || '',
      teamId: teamId || '',
      snapshotId: snapshotId || '',
    };
  } catch(e) {
    snapshotContext = {
      managerName: 'there',
      problemTitle: 'the problem raised',
      currentState: '',
      ishikawa: '',
      waste: '',
      teamId: teamId || '',
      snapshotId: snapshotId || '',
    };
  }
  setTimeout(() => startConversation(snapshotContext), 500);
});

async function startConversation(context) {
  window.slidesShown = false;
  window.slidesPreviewShown = false;
  conversationComplete = false;
  currentActions = [];
  currentActionDraft = {};
  reviewDate = null;
  conversationHistory = [];

  let opening;
  if (context) {
opening = `Hi ${context.managerName}.\n\n${context.problemTitle}. ${context.currentState}\n\nDo you have any idea what's behind it?`;
  } else {
    opening = "Hi. What problem are we working on today?";
  }

  const contextMessage = context
    ? `CONTEXT: ${JSON.stringify(context)}`
    : '';

  if (contextMessage) {
    conversationHistory.push({ role: 'user', content: contextMessage });
    conversationHistory.push({ role: 'assistant', content: opening });
  } else {
    conversationHistory.push({ role: 'assistant', content: opening });
  }

  addMessage('bot', opening);
}

function parseSuggestCheckbox(content) {
  if (!content.includes('[CHECKBOX_SUGGEST]')) return null;
  const introMatch = content.match(/^([\s\S]*?)\[CHECKBOX_SUGGEST\]/);
  const intro = introMatch ? introMatch[1].trim() : '';
  const items = [];
  const lines = content.split('\n');
  let inBlock = false;
  for (const line of lines) {
    if (line.includes('[CHECKBOX_SUGGEST]')) { inBlock = true; continue; }
    if (line.includes('[END_CHECKBOX]')) { inBlock = false; continue; }
    if (inBlock) {
      const match = line.match(/^-\s+(.+)$/);
      if (match) items.push(match[1].trim());
    }
  }
  const outroMatch = content.match(/\[END_CHECKBOX\]([\s\S]*)$/);
  const outro = outroMatch ? outroMatch[1].trim() : '';
  return { intro, items, outro };
}

function parseSpecialTags(reply) {
  if (reply.includes('[SCORE_EFFORT]')) {
    const intro = reply.replace('[SCORE_EFFORT]', '').trim();
    return { type: 'score_effort', intro };
  }
  if (reply.includes('[SCORE_IMPACT]')) {
    const intro = reply.replace('[SCORE_IMPACT]', '').trim();
    return { type: 'score_impact', intro };
  }
  if (reply.includes('[DATE_DUE]')) {
    const intro = reply.replace('[DATE_DUE]', '').trim();
    return { type: 'date_due', intro };
  }
  if (reply.includes('[DATE_REVIEW]')) {
    const intro = reply.replace('[DATE_REVIEW]', '').trim();
    return { type: 'date_review', intro };
  }
  if (reply.includes('[ADD_ACTION]')) {
    const intro = reply.replace('[ADD_ACTION]', '').trim();
    return { type: 'add_action', intro };
  }
  if (reply.includes('[CONFIRM]')) {
    const intro = reply.replace('[CONFIRM]', '').trim();
    return { type: 'confirm', intro };
  }
  return null;
}

async function extractAndSendJSON(replyText) {
  try {
    const jsonResponse = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        system: 'You are a data extraction assistant. Based on the conversation provided, generate ONLY a valid JSON object with these exact fields: snapshot_id, team_id, problem_title, created_by, working_hypothesis, review_date (DD/MM/YYYY), overall_effort_score (number), overall_impact_score (number), status, actions (array of objects each with: action_number, description, purpose, owner, effort_score, impact_score, due_date DD/MM/YYYY, status). Return only the JSON object, nothing else. No markdown, no backticks.',
        messages: [...conversationHistory, { role: 'user', content: 'Generate the JSON output for this ActionPlan conversation now.' }]
      })
    });
    const jsonData = await jsonResponse.json();
    const jsonText = jsonData.content[0].text;
    const parsed = JSON.parse(jsonText.replace(/```json|```/g, '').trim());

    // Generate ActionPlan ID from snapshot ID
    const snapshotId = snapshotContext?.snapshotId || parsed.snapshot_id || '';
    parsed.action_plan_id = snapshotId ? `${snapshotId}-AP1` : '';
    parsed.snapshot_id = snapshotId;
    parsed.team_id = snapshotContext?.teamId || parsed.team_id || '';
    parsed.date_created = new Date().toLocaleDateString('en-GB');
    parsed.status = 'Active';
    parsed.type = 'actionplan';

    // Add action IDs
    if (parsed.actions) {
      parsed.actions = parsed.actions.map((a, i) => ({
        ...a,
        action_id: `${parsed.action_plan_id}-ACT${i + 1}`,
        action_plan_id: parsed.action_plan_id,
        snapshot_id: parsed.snapshot_id,
        team_id: parsed.team_id,
        status: 'Open',
      }));
    }

    window.currentActionPlanData = parsed;     sessionStorage.setItem('anttro_actionplan', JSON.stringify(parsed));
  } catch(err) {
    console.error('JSON extraction error:', err);
  }
  // Show slides first — Make webhook fires on submit
  showSlidePreview();
}

async function submitToMake() {
  if (!window.currentActionPlanData) return;
  try {
    await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'send_to_make', data: window.currentActionPlanData })
    });
  } catch(e) {
    console.error('Make webhook error:', e);
  }
}

function sendUserMessage(text) {
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  sendToAPI();
}

async function sendToAPI() {
  showError('');
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();
  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API request failed');
    }
    const data = await response.json();
    const reply = data.content[0].text;
    conversationHistory.push({ role: 'assistant', content: reply });
    removeTyping();

    // Strip JSON from display
    let cleanReply = reply
      .replace(/```json[\s\S]*?```/g, '')
      .replace(/```[\s\S]*?```/g, '')
      .replace(/\{[\s\S]*"actions"[\s\S]*\}/g, '')
      .trim();

    // Check for suggestion checkboxes
    const suggestParsed = parseSuggestCheckbox(cleanReply);
    if (suggestParsed) {
      // Show intro text first if there is any
      const introOnly = cleanReply.split('[CHECKBOX_SUGGEST]')[0].trim();
      if (introOnly) addMessage('bot', introOnly);
      renderSuggestCheckbox(suggestParsed);
    } else {
      // Check for special tags
      const special = parseSpecialTags(cleanReply);
    if (special) {
      const introText = special.intro.replace(/\[.*?\]/g, '').trim();
      if (special.type === 'score_effort') renderScorePicker(introText, 'effort');
      else if (special.type === 'score_impact') renderScorePicker(introText, 'impact');
      else if (special.type === 'date_due') renderDatePicker(introText, 'due');
      else if (special.type === 'date_review') renderDatePicker(introText, 'review');
      else if (special.type === 'add_action') renderAddAction(introText);
      else if (special.type === 'confirm') renderConfirm(introText);
    } else if (cleanReply && !reply.includes('Sorted. 👊')) {
      addMessage('bot', cleanReply);
    }
    }

    if (reply.includes('Sorted. 👊') && !window.slidesShown) {
      conversationComplete = true;
      window.slidesShown = true;
      document.getElementById('userInput').disabled = true;
      document.getElementById('sendBtn').disabled = true;
      addMessage('bot', 'Sorted. 👊');
      await extractAndSendJSON(reply);
    }

  } catch(err) {
    removeTyping();
    showError('Something went wrong: ' + err.message);
    conversationHistory.pop();
  }
  isLoading = false;
  if (!conversationComplete) {
    document.getElementById('sendBtn').disabled = false;
  }
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading || conversationComplete) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  await sendToAPI();
}

</script>
