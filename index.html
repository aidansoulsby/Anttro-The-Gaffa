<script>
// Webhook handled server side via /api/chat

const SYSTEM_PROMPT = `You are The Gaffa. You help people log problems quickly and clearly so something actually gets done about them.

You know lean methodology and problem solving inside out but you never show it. To the person you're talking to you're just a knowledgeable colleague who gets it and asks the right questions.

You are not a form. You are not a chatbot. You are The Gaffa.

Your Personality:
Short sentences. Plain language. Warm but direct. You sound like the most experienced person in the room, not a consultant or a computer. No long dashes. No formal phrasing. No corporate language. Talk like a real person having a quick chat.

Examples of the right tone:
Instead of "I understand, that must be frustrating" say "Yeah that's a pain."
Instead of "Thank you for providing that information" say "Got it."
Instead of "Could you elaborate further" say "Tell me a bit more about that."
Keep every message as short as possible. One or two sentences maximum per response unless presenting a list.
Never say "Fair enough." Never say "That's helpful" or "Great" or any hollow filler phrase.
Short answers are valid. Accept them and move on.
One word acknowledgements are fine. "Got it." "Right." "Noted." Then next question.

CRITICAL RULE: Before asking any question you MUST check whether the user has already provided that information anywhere in the conversation. If they mentioned the location, area, time, frequency, or impact in ANY previous message do NOT ask for it again. Extract it silently and move on. Asking for information already provided is a serious failure. If you catch yourself about to ask something already answered, skip it entirely and move to the next genuinely missing piece of information.

Your Rules:
Always ask one question at a time. Never combine two questions into one message.
Never summarise or repeat back what the user just said before asking the next question.
Never use lean terminology. No Ishikawa, 5 Whys, waste types, Kaizen, PDCA. Ever.
Never invent facts or add information the user hasn't given you.
Only use location and area words the user has actually used.
Never rush anyone. A complete accurate Snapshot matters more than a fast one.
Never probe the same point more than once.
Never blame individuals or suggest personal fault.
Always make the user feel like raising this was the right thing to do.

Your Conversation Flow:
Phase one — Name and role.
Start with exactly this: "Alright, let's get this logged. What's your name?"
Once they answer ask "And what's your role?"

Phase two — What is happening.
Ask what the problem is. Say something like "What's the problem? The more detail you can give me the better your SnapShot will be." If not already mentioned ask which area, team, or department. Ask how often.

Phase three — What is the impact.
Ask what happens when it occurs and the impact on time, quality, or the team. One question only. Once you have any indication of impact move on. Ask how long it has been going on. Then move to phase four.

Phase four — Contributing factors.
Say exactly this: "What do you reckon is playing a part in this? Pick everything that feels relevant. [CHECKBOX_ISHIKAWA]" Then list:
- People — the way the team work or their training
- Equipment — machines, tools, or technology
- Process — the way the job is done or documented
- Materials — parts, supplies, or resources
- Environment — the workplace, layout, or conditions
- Management — how things are organised or communicated
[END_CHECKBOX]
Once selected acknowledge briefly and move to phase five. Do not ask for examples.

Phase five — Waste types.
Say exactly this: "Does any of this sound familiar? Pick everything that applies. [CHECKBOX_WASTE]" Then list:
- Waiting — time spent idle or delayed
- Movement — people or things moving more or less than needed
- Defects — errors, mistakes, or things not done right first time
- Overproduction — doing more than is needed or too early
- Inventory — too much or too little of something
- Process — steps or parts of the process that don't add value
[END_CHECKBOX]
Once selected acknowledge briefly and move to phase six.

Phase six — Has anything been tried.
Ask simply if anything has been tried to fix this. If yes ask briefly what happened. If no move to close.

Ending The Conversation:
Summarise the problem back in two plain English sentences using "you" and "your" not the user's name. Ask if that sounds right.
Once confirmed say exactly this: "Nice one. Your SnapShot is on its way. 👊"

Your Output:

let conversationHistory = [];
let isLoading = false;
let conversationComplete = false;
let resetTimer = null;

window.addEventListener('load', () => {
  setTimeout(() => startConversation(), 500);
});

async function startConversation() {
  window.slidesShown = false;
  window.slidesPreviewShown = false;
  window.feedbackDone = false;
  window.currentPresentationId = null;
  conversationComplete = false;
  const openingMessage = "Alright, let's get this logged. What's your name?";
  conversationHistory = [];
  conversationHistory.push({ role: 'assistant', content: openingMessage });

}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function getTime() {
  return new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  if (msg) { el.textContent = msg; el.style.display = 'block'; }
  else { el.style.display = 'none'; }
}

function addMessage(role, content) {
  const messages = document.getElementById('messages');
  const group = document.createElement('div');
  group.className = 'message-group';
  const msg = document.createElement('div');
  msg.className = 'message ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + role;
  avatar.textContent = role === 'bot' ? 'G' : 'U';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  msg.appendChild(avatar);
  msg.appendChild(bubble);

function showTyping() {
  const messages = document.getElementById('messages');
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.id = 'typingIndicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = 'G';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

  typing.appendChild(dots);

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function parseCheckboxMessage(content) {
  const ishikawa = content.includes('[CHECKBOX_ISHIKAWA]');
  const waste = content.includes('[CHECKBOX_WASTE]');
  if (!ishikawa && !waste) return null;
  const introMatch = content.match(/^([\s\S]*?)\[CHECKBOX_/);
  const intro = introMatch ? introMatch[1].trim() : '';
  const items = [];
  const lines = content.split('\n');
  for (const line of lines) {
    const match = line.match(/^-\s+(.+?)[\s\u2014\-]+(.+)$/);
    if (match) items.push({ label: match[1].trim(), desc: match[2].trim() });
    else {
      const simple = line.match(/^-\s+(.+)$/);
      if (simple && !simple[1].includes('[CHECKBOX')) items.push({ label: simple[1].trim(), desc: '' });
    }
  }
  return { intro, items, type: waste ? 'waste' : 'ishikawa' };
}

function renderCheckboxMessage(parsed) {
  const messages = document.getElementById('messages');
  const group = document.createElement('div');
  group.className = 'message-group';
  const msg = document.createElement('div');
  msg.className = 'message bot';
  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = 'G';
  const container = document.createElement('div');
  container.className = 'checkbox-container';
  const intro = document.createElement('div');
  intro.className = 'checkbox-intro';
  intro.textContent = parsed.intro;
  container.appendChild(intro);
  const selected = new Set();
  parsed.items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'checkbox-item';
    row.onclick = () => {
      if (selected.has(i)) { selected.delete(i); row.classList.remove('selected'); }
      else { selected.add(i); row.classList.add('selected'); }
      confirmBtn.disabled = selected.size === 0;
    };
    const box = document.createElement('div');
    box.className = 'checkbox-box';
    const label = document.createElement('div');
    label.className = 'checkbox-label';
    label.innerHTML = item.desc ? '<strong>' + item.label + '</strong> — ' + item.desc : '<strong>' + item.label + '</strong>';
    row.appendChild(box);
    row.appendChild(label);
    container.appendChild(row);
  });
  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'checkbox-confirm';
  confirmBtn.textContent = 'Confirm selections';
  confirmBtn.disabled = true;
  confirmBtn.onclick = () => {
    const selections = Array.from(selected).map(i => parsed.items[i].label).join(', ');
    confirmBtn.disabled = true;
    confirmBtn.textContent = '✓ Done';
    container.querySelectorAll('.checkbox-item').forEach(r => r.style.pointerEvents = 'none');
    sendUserMessage(selections);
  };
  container.appendChild(confirmBtn);
  msg.appendChild(avatar);
  msg.appendChild(container);
  const time = document.createElement('div');
  time.className = 'timestamp';
  time.textContent = getTime();
  group.appendChild(msg);
  group.appendChild(time);
  messages.appendChild(group);
  messages.scrollTop = messages.scrollHeight;
}

function showFeedbackAndLoading() {
  const messages = document.getElementById('messages');
  window.feedbackDone = false;

  const feedbackGroup = document.createElement('div');
  feedbackGroup.className = 'message-group';
  const feedbackMsg = document.createElement('div');
  feedbackMsg.className = 'message bot';
  const feedbackAvatar = document.createElement('div');
  feedbackAvatar.className = 'avatar bot';
  feedbackAvatar.textContent = 'G';
  const container = document.createElement('div');
  container.className = 'checkbox-container';
  const intro = document.createElement('div');
  intro.className = 'checkbox-intro';
  intro.textContent = 'How did you find using SnapShot?';
  container.appendChild(intro);

  const feedbackItems = [
    { label: 'Easy to use', desc: 'Straightforward from start to finish' },
    { label: 'Could be simpler', desc: 'A few things could be clearer' },
    { label: 'Needed more help', desc: 'I struggled with some parts' }
  ];
  const selected = new Set();
  feedbackItems.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'checkbox-item';
    row.onclick = () => {
      selected.forEach(s => container.querySelectorAll('.checkbox-item')[s].classList.remove('selected'));
      selected.clear();
      selected.add(i);
      row.classList.add('selected');
      confirmBtn.disabled = false;
    };
    const box = document.createElement('div');
    box.className = 'checkbox-box';
    const label = document.createElement('div');
    label.className = 'checkbox-label';
    label.innerHTML = '<strong>' + item.label + '</strong> — ' + item.desc;
    row.appendChild(box);
    row.appendChild(label);
    container.appendChild(row);
  });

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'checkbox-confirm';
  confirmBtn.textContent = 'Submit feedback';
  confirmBtn.disabled = true;
  confirmBtn.onclick = () => {
    confirmBtn.disabled = true;
    confirmBtn.textContent = '✓ Thanks!';
    container.querySelectorAll('.checkbox-item').forEach(r => r.style.pointerEvents = 'none');
    window.feedbackDone = true;
    if (window.currentPresentationId) {
      const lg = document.getElementById('loadingGroup');
      if (lg) lg.remove();
      showSlidePreview();
    }
  };
  container.appendChild(confirmBtn);
  feedbackMsg.appendChild(feedbackAvatar);
  feedbackMsg.appendChild(container);
  feedbackGroup.appendChild(feedbackMsg);
  messages.appendChild(feedbackGroup);

  const loadingGroup = document.createElement('div');
  loadingGroup.className = 'message-group';
  loadingGroup.id = 'loadingGroup';
  const loadingMsg = document.createElement('div');
  loadingMsg.className = 'message bot';
  const loadingAvatar = document.createElement('div');
  loadingAvatar.className = 'avatar bot';
  loadingAvatar.textContent = 'G';
  const loadingContainer = document.createElement('div');
  loadingContainer.className = 'loading-container';
  loadingContainer.innerHTML = '<div class="loading-text">SnapShot generating...</div><div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';
  loadingMsg.appendChild(loadingAvatar);
  loadingMsg.appendChild(loadingContainer);
  loadingGroup.appendChild(loadingMsg);
  messages.appendChild(loadingGroup);
  messages.scrollTop = messages.scrollHeight;

  window.slideCheckInterval = setInterval(() => {
    if (window.feedbackDone && window.currentPresentationId) {
      clearInterval(window.slideCheckInterval);
      const lg = document.getElementById('loadingGroup');
      if (lg) lg.remove();
      showSlidePreview();
    }
  }, 500);

  setTimeout(() => {
    clearInterval(window.slideCheckInterval);
    const lg = document.getElementById('loadingGroup');
    if (lg) lg.remove();
    if (!window.slidesPreviewShown) showSlidePreview();
  }, 15000);
}

function showSlidePreview() {
  if (window.slidesPreviewShown) return;
  window.slidesPreviewShown = true;
  const messages = document.getElementById('messages');

  const group = document.createElement('div');
  group.className = 'message-group';
  const msg = document.createElement('div');
  msg.className = 'message bot';
  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = 'G';

  const container = document.createElement('div');
  container.className = 'slides-container';

  const header = document.createElement('div');
  header.className = 'slides-header';
  header.textContent = 'Your SnapShot is ready.';
  container.appendChild(header);

  const submitBtn = document.createElement('button');
  submitBtn.className = 'slides-btn slides-btn-submit';
  submitBtn.style.marginBottom = '10px';
  submitBtn.textContent = '✓ Submit to My Manager';
  submitBtn.onclick = () => {
    submitBtn.disabled = true;
    submitBtn.textContent = '✓ Submitted!';
    addMessage('bot', "Thanks for helping close the loop. Your manager has been notified and this has been logged. You know where I am if you have any other problems. 👊");
    startResetTimer();
  };
  container.appendChild(submitBtn);

  const previewBtn = document.createElement('button');
  previewBtn.className = 'slides-btn slides-btn-download';
  previewBtn.textContent = '👁️ Preview & Download SnapShot';
  previewBtn.onclick = () => {
    try {
      if (window.currentSnapshotData) {
        sessionStorage.setItem('anttro_snapshot', JSON.stringify(window.currentSnapshotData));
      }
      window.open('/snapshot-slides.html', '_blank');
    } catch(e) {
      previewBtn.textContent = 'Could not open — try again';
      setTimeout(() => { previewBtn.textContent = '👁️ Preview & Download SnapShot'; }, 3000);
    }
  };
  container.appendChild(previewBtn);

  msg.appendChild(avatar);
  msg.appendChild(container);
  const time = document.createElement('div');
  time.className = 'timestamp';
  time.textContent = getTime();
  group.appendChild(msg);
  group.appendChild(time);
  messages.appendChild(group);
  messages.scrollTop = messages.scrollHeight;

  document.getElementById('userInput').disabled = true;
  document.getElementById('sendBtn').disabled = true;
}

function startResetTimer() {
  resetTimer = setTimeout(() => {
    const messages = document.getElementById('messages');
    messages.innerHTML = '';
    startConversation();
  }, 300000);
}

async function extractAndSendJSON(replyText) {
  try {
    const jsonResponse = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: 'You are a data extraction assistant. Based on the conversation provided, generate ONLY a valid JSON object with these exact fields: problem_title, created_by, current_state, ishikawa_factors, waste_factors, why_this_matters, anttro_insight. Return only the JSON object, nothing else. No markdown, no backticks.',
        messages: [...conversationHistory, { role: 'user', content: 'Generate the JSON output for this conversation now.' }]
      })
    });
    const jsonData = await jsonResponse.json();
    const jsonText = jsonData.content[0].text;
    const parsed = JSON.parse(jsonText);
    window.currentSnapshotData = parsed;
    // Generate snapshot URL with base64 encoded data for Sheets link
    try {
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(parsed))));
      parsed.snapshot_url = 'https://project-mdv99.vercel.app/snapshot-slides.html?data=' + encoded;
    } catch(e) {}
    try {
      const makeResponse = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'send_to_make', data: parsed })
      });
      if (makeResponse.ok) {
        try {
          const makeData = await makeResponse.json();
          if (makeData && makeData.presentation_id) {
            window.currentPresentationId = makeData.presentation_id;
          }
        } catch(e) {}
      }
    } catch(e) {}
  } catch(err) {
    console.error('Error:', err);
  }
}

function sendUserMessage(text) {
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  sendToAPI();
}

async function sendToAPI() {
  showError('');
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();
  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API request failed');
    }
    const data = await response.json();
    const reply = data.content[0].text;
    conversationHistory.push({ role: 'assistant', content: reply });
    removeTyping();

    let cleanReply = reply;
    cleanReply = cleanReply.replace(/```json[\s\S]*?```/g, '');
    cleanReply = cleanReply.replace(/```[\s\S]*?```/g, '');
    cleanReply = cleanReply.replace(/\{[\s\S]*"why_this_matters"[\s\S]*\}/g, '');
    cleanReply = cleanReply.replace(/\{[\s\S]*"anttro_insight"[\s\S]*\}/g, '');
    cleanReply = cleanReply.trim();

    const parsed = parseCheckboxMessage(cleanReply);
    if (parsed) {
      renderCheckboxMessage(parsed);
    } else if (cleanReply) {
      addMessage('bot', cleanReply);
    }

    if (reply.includes('Nice one.') && !window.slidesShown) {
      conversationComplete = true;
      window.slidesShown = true;
      document.getElementById('userInput').disabled = true;
      document.getElementById('sendBtn').disabled = true;
      extractAndSendJSON(reply);
      showFeedbackAndLoading();
    }
  } catch(err) {
    removeTyping();
    showError('Something went wrong: ' + err.message);
    conversationHistory.pop();
  }
  isLoading = false;
  if (!conversationComplete) {
    document.getElementById('sendBtn').disabled = false;
  }
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading || conversationComplete) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  await sendToAPI();
}
