<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anttro — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f4f1;--ink:#1d1f24;--ink-soft:#5a5f6a;--ink-faint:#9aa0ab;
    --line:rgba(0,0,0,0.10);--white:#fff;--orange:#ff5a1f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;font-family:'Open Sans',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}

  .bloom{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;background:#f6f4f1;}
  .bloom::before{content:'';position:absolute;width:115vw;height:115vw;right:-30vw;bottom:-45vw;
    background:radial-gradient(circle at 50% 50%, rgba(255,120,60,0.20) 0%, rgba(255,90,31,0.08) 36%, rgba(255,90,31,0) 64%);filter:blur(20px);}
  .bloom::after{content:'';position:absolute;width:90vw;height:90vw;right:-14vw;bottom:-32vw;
    background:radial-gradient(circle at 50% 50%, rgba(120,110,255,0.15) 0%, rgba(90,130,240,0.06) 44%, rgba(90,130,240,0) 70%);filter:blur(24px);}

  .wrap{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}

  .card{background:#fff;border-radius:20px;padding:48px 44px 44px;width:100%;max-width:420px;box-shadow:0 4px 32px rgba(0,0,0,0.08);}

  .logo{font-family:'Barlow',sans-serif;font-weight:900;font-size:28px;color:var(--ink);letter-spacing:-0.03em;margin-bottom:8px;}
  .logo span{color:var(--orange);}
  .tagline{font-size:13px;color:var(--ink-faint);font-weight:500;margin-bottom:36px;}

  .card-title{font-family:'Barlow',sans-serif;font-weight:800;font-size:22px;color:var(--ink);margin-bottom:6px;}
  .card-sub{font-size:13px;color:var(--ink-soft);margin-bottom:28px;line-height:1.5;}

  label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;}

  input[type=email]{
    width:100%;padding:13px 16px;border:1.5px solid var(--line);border-radius:10px;
    font-family:'Open Sans',sans-serif;font-size:15px;color:var(--ink);background:#fafaf9;
    outline:none;transition:border-color .15s;
  }
  input[type=email]:focus{border-color:var(--orange);}
  input[type=email]::placeholder{color:var(--ink-faint);}

  .btn{
    width:100%;margin-top:16px;padding:14px;border:none;border-radius:10px;
    background:var(--orange);color:#fff;font-family:'Barlow',sans-serif;font-weight:800;
    font-size:16px;letter-spacing:0.01em;cursor:pointer;transition:opacity .15s;
  }
  .btn:hover{opacity:0.88;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}

  .msg{margin-top:18px;padding:13px 16px;border-radius:10px;font-size:13px;font-weight:600;line-height:1.5;display:none;}
  .msg.success{background:#edfaf3;color:#1a7a4a;display:block;}
  .msg.error{background:#fef2f2;color:#b91c1c;display:block;}

  .code-section{display:none;margin-top:20px;}
  .code-section label{margin-bottom:6px;}
  input[type=text]{
    width:100%;padding:13px 16px;border:1.5px solid var(--line);border-radius:10px;
    font-family:'Open Sans',sans-serif;font-size:22px;font-weight:700;color:var(--ink);
    background:#fafaf9;outline:none;transition:border-color .15s;letter-spacing:0.15em;text-align:center;
  }
  input[type=text]:focus{border-color:var(--orange);}

  .back-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--ink-faint);cursor:pointer;}
  .back-link:hover{color:var(--orange);}

  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="bloom"></div>

<div class="wrap">
  <div class="card">
    <div class="logo">Anttro<span>.</span></div>
    <div class="tagline">Raise it. Action it. Close it.</div>

    <!-- Step 1: Email -->
    <div id="stepEmail">
      <div class="card-title">Sign in</div>
      <div class="card-sub">Enter your email and we will send you a one-time code to sign in.</div>

      <label for="emailInput">Email address</label>
      <input type="email" id="emailInput" placeholder="you@yourcompany.com" autocomplete="email" />

      <button class="btn" id="sendBtn" onclick="sendCode()">Send sign-in code</button>
      <div class="msg" id="emailMsg"></div>
    </div>

    <!-- Step 2: Code -->
    <div class="code-section" id="stepCode">
      <div class="card-title">Check your email</div>
      <div class="card-sub" id="codeSubText">We sent a 6-digit code to your email. Enter it below.</div>

      <label for="codeInput">Sign-in code</label>
      <input type="text" id="codeInput" placeholder="000000" maxlength="6" inputmode="numeric" />

      <button class="btn" id="verifyBtn" onclick="verifyCode()">Sign in</button>
      <div class="msg" id="codeMsg"></div>
      <span class="back-link" onclick="resetToEmail()">Use a different email</span>
    </div>
  </div>
</div>

<script>
  // Inject publishable key at runtime via meta tag approach
  // This will be replaced with actual key from environment
  const CLERK_PUBLISHABLE_KEY = 'pk_test_d2lubmluZy1kYXNzaWUtNDMuY2xlcmsuYWNjb3VudHMuZGV2JA';
</script>
<script async crossorigin="anonymous"
  data-clerk-publishable-key="pk_test_d2lubmluZy1kYXNzaWUtNDMuY2xlcmsuYWNjb3VudHMuZGV2JA"
  src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
  type="text/javascript">
</script>

<script>
  let clerk;
  let signInAttempt;

  // Wait for Clerk to load
  window.addEventListener('load', async () => {
    // Poll for Clerk to be ready
    let attempts = 0;
    while (!window.Clerk && attempts < 20) {
      await new Promise(r => setTimeout(r, 200));
      attempts++;
    }

    if (!window.Clerk) {
      showMsg('emailMsg', 'error', 'Failed to load authentication. Please refresh the page.');
      return;
    }

    clerk = window.Clerk;
    await clerk.load();

    // If already signed in, go straight to dashboard
    if (clerk.user) {
      window.location.href = '/dashboard';
    }
  });

  async function sendCode() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) {
      showMsg('emailMsg', 'error', 'Please enter your email address.');
      return;
    }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Sending...';
    clearMsg('emailMsg');

    try {
      signInAttempt = await clerk.client.signIn.create({
        identifier: email,
        strategy: 'email_code',
      });

      // Show code step
      document.getElementById('stepEmail').style.display = 'none';
      document.getElementById('stepCode').style.display = 'block';
      document.getElementById('codeSubText').textContent = `We sent a 6-digit code to ${email}. Enter it below.`;
      document.getElementById('codeInput').focus();

    } catch (err) {
      const msg = err.errors?.[0]?.message || 'Something went wrong. Please try again.';
      // Friendly message for unrecognised emails
      if (msg.toLowerCase().includes('no user') || msg.toLowerCase().includes('not found') || msg.toLowerCase().includes('couldn\'t find')) {
        showMsg('emailMsg', 'error', 'That email address is not registered with Anttro. Contact your administrator.');
      } else {
        showMsg('emailMsg', 'error', msg);
      }
      btn.disabled = false;
      btn.textContent = 'Send sign-in code';
    }
  }

  async function verifyCode() {
    const code = document.getElementById('codeInput').value.trim();
    if (!code || code.length < 6) {
      showMsg('codeMsg', 'error', 'Please enter the 6-digit code from your email.');
      return;
    }

    const btn = document.getElementById('verifyBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';
    clearMsg('codeMsg');

    try {
      const result = await signInAttempt.attemptFirstFactor({
        strategy: 'email_code',
        code,
      });

      if (result.status === 'complete') {
        await clerk.setActive({ session: result.createdSessionId });
        window.location.href = '/dashboard';
      } else {
        showMsg('codeMsg', 'error', 'Sign in incomplete. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }

    } catch (err) {
      const msg = err.errors?.[0]?.message || 'Invalid code. Please try again.';
      if (msg.toLowerCase().includes('incorrect') || msg.toLowerCase().includes('invalid')) {
        showMsg('codeMsg', 'error', 'That code is incorrect. Please check your email and try again.');
      } else if (msg.toLowerCase().includes('expired')) {
        showMsg('codeMsg', 'error', 'That code has expired. Go back and request a new one.');
      } else {
        showMsg('codeMsg', 'error', msg);
      }
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }

  // Allow pressing Enter on inputs
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('stepCode').style.display === 'block') {
      verifyCode();
    } else {
      sendCode();
    }
  });

  function resetToEmail() {
    document.getElementById('stepCode').style.display = 'none';
    document.getElementById('stepEmail').style.display = 'block';
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('sendBtn').textContent = 'Send sign-in code';
    clearMsg('emailMsg');
    signInAttempt = null;
  }

  function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
  }

  function clearMsg(id) {
    const el = document.getElementById(id);
    el.className = 'msg';
    el.textContent = '';
  }
</script>
</body>
</html>
